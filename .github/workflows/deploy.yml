name: Deploy .NET to Azure

on:
  push:
    branches:
      - main   # nếu bạn dùng master thì đổi lại

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'   # đổi nếu bạn dùng .NET 6/7

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish BlazorAppTest/SVLaixe -c Release -o publish

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: laixe-api
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: publish
